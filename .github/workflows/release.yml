name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        run: sudo apt-get install -y musl-tools
      - run: cargo build --release --target x86_64-unknown-linux-musl
      - uses: actions/upload-artifact@v4
        with:
          name: api-switch-linux-amd64
          path: target/x86_64-unknown-linux-musl/release/api-switch

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target aarch64-apple-darwin
      - run: cargo build --release --target x86_64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: api-switch-darwin-arm64
          path: target/aarch64-apple-darwin/release/api-switch
      - uses: actions/upload-artifact@v4
        with:
          name: api-switch-darwin-amd64
          path: target/x86_64-apple-darwin/release/api-switch

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: api-switch-windows-amd64
          path: target/release/api-switch.exe

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/api-switch-linux-amd64/api-switch release/api-switch-linux-amd64
          cp artifacts/api-switch-darwin-arm64/api-switch release/api-switch-darwin-arm64
          cp artifacts/api-switch-darwin-amd64/api-switch release/api-switch-darwin-amd64
          cp artifacts/api-switch-windows-amd64/api-switch.exe release/api-switch-windows-amd64.exe
          chmod +x release/*
      - uses: softprops/action-gh-release@v1
        with:
          files: release/*
          body: |
            ## API Switch ${{ github.ref_name }}

            A high-performance LLM API gateway written in Rust.

            ## Features
            - Multi-provider support (OpenAI, Claude, Gemini, Azure)
            - Load balancing with automatic failover
            - Circuit breaker for fault tolerance
            - Token usage tracking

            ## Installation

            ### Linux
            ```bash
            curl -L https://github.com/simer11-jing/api-switch/releases/download/${{ github.ref_name }}/api-switch-linux-amd64 -o api-switch
            chmod +x api-switch
            ./api-switch
            ```

            ### macOS (Apple Silicon)
            ```bash
            curl -L https://github.com/simer11-jing/api-switch/releases/download/${{ github.ref_name }}/api-switch-darwin-arm64 -o api-switch
            chmod +x api-switch
            ./api-switch
            ```

            ### Windows
            Download `api-switch-windows-amd64.exe`

            ### Docker
            ```bash
            docker run -d --name api-switch \
              -p 9091:9091 \
              -v api-switch-data:/app/data \
              simer11/api-switch:latest
            ```
