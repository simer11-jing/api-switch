name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: Install musl tools
        run: sudo apt-get install -y musl-tools
      - run: cargo build --release --target x86_64-unknown-linux-musl
      - uses: actions/upload-artifact@v4
        with:
          name: api-switch-linux-amd64
          path: target/x86_64-unknown-linux-musl/release/api-switch

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin, x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --target aarch64-apple-darwin
      - run: cargo build --release --target x86_64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: api-switch-darwin-arm64
          path: target/aarch64-apple-darwin/release/api-switch
      - uses: actions/upload-artifact@v4
        with:
          name: api-switch-darwin-amd64
          path: target/x86_64-apple-darwin/release/api-switch

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: api-switch-windows-amd64
          path: target/release/api-switch.exe

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [build-linux]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
      - uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            simer11/api-switch:latest
            simer11/api-switch:${{ steps.version.outputs.VERSION }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows, docker]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Display structure of downloaded files
        run: ls -R artifacts
      - uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/api-switch-linux-amd64/api-switch
            artifacts/api-switch-darwin-arm64/api-switch
            artifacts/api-switch-darwin-amd64/api-switch
            artifacts/api-switch-windows-amd64/api-switch.exe
          body: |
            ## What's Changed

            See [CHANGELOG.md](https://github.com/simer11-jing/api-switch/blob/main/CHANGELOG.md) for details.

            ## Installation

            ### Linux
            ```bash
            curl -L https://github.com/simer11-jing/api-switch/releases/download/${{ github.ref_name }}/api-switch-linux-amd64 -o api-switch
            chmod +x api-switch
            ./api-switch
            ```

            ### macOS (Apple Silicon)
            ```bash
            curl -L https://github.com/simer11-jing/api-switch/releases/download/${{ github.ref_name }}/api-switch-darwin-arm64 -o api-switch
            chmod +x api-switch
            ./api-switch
            ```

            ### Docker
            ```bash
            docker pull simer11/api-switch:${{ github.ref_name }}
            ```
